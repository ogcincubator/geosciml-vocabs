name: Update OGC vocabularies

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone upstream CGI vocabularies
        run: git clone --depth 1 https://github.com/GeoscienceAustralia/cgi-vocabs.git upstream

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        env:
          SPARQL_USERNAME: ${{ secrets.SPARQL_USERNAME }}
          SPARQL_PASSWORD: ${{ secrets.SPARQL_PASSWORD }}
          GRAPH_URI: ${{ vars.GRAPH_URI }}
          SPARQL_GSP_ENDPOINT: ${{ vars.SPARQL_GSP_ENDPOINT }}
        run: python scripts/update.py

      - name: Commit generated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ogc/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update OGC vocabularies from upstream"
            git push
          fi
